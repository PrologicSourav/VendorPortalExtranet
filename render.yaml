services:
  - type: web
    name: vendorportal-api
    env: dotnet
    plan: free
    region: oregon
    buildCommand: dotnet publish src/WebProlific.Api/WebProlific.Api.csproj -c Release
    startCommand: dotnet src/WebProlific.Api/bin/Release/net8.0/publish/WebProlific.Api.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        value: Server=182.78.194.30\\SQL2017,2017;Database=WebProlific;User Id=opm1;Password=;TrustServerCertificate=True;MultipleActiveResultSets=true
      - key: AllowedOrigins
        value: https://vendorportal-frontend.onrender.com,http://localhost:4200,http://localhost:4201

  - type: static
    name: vendorportal-frontend
    rootDir: frontend/supplier-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist/supplier-portal
    envVars:
      - key: NODE_VERSION
        value: 20
