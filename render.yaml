services:
  - type: web
    name: vendorportal-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        sync: false # set manually in Render dashboard — do not commit real value here
      - key: AllowedOrigins
        value: https://vendorportal-frontend-rxwy.onrender.com,https://vendorportal-frontend.onrender.com,http://localhost:4200,http://localhost:4201
      - key: Jwt__Key
        sync: false # set manually in Render dashboard — do not commit real value here
      - key: Jwt__Issuer
        value: WebProlific
      - key: Jwt__Audience
        value: WebProlific
      - key: DOTNET_hostBuilder__reloadConfigOnChange
        value: "false"

  - type: web
    runtime: static
    name: vendorportal-frontend
    rootDir: frontend/supplier-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist/supplier-portal/browser
    # SPA fallback: without this, a direct load or refresh of any client-side
    # route (/dashboard, /catalogue, …) returns Render's "Not Found" because no
    # such file exists on disk. Rewrite every path to index.html so Angular's
    # router can resolve it. Must be a rewrite (serves index.html at the original
    # URL), not a redirect (which would change the address bar back to /).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    runtime: static
    name: vendorportal-governance
    rootDir: frontend/governance-console
    buildCommand: npm install && npm run build
    staticPublishPath: dist/governance-console/browser
    # SPA fallback — same reason as the supplier portal above: rewrite every path
    # to index.html so the Angular router can resolve deep links / refreshes.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
